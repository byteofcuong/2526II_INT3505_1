openapi: 3.0.0
info:
  title: Product API
  version: 1.0.0
  description: A complete API specification for managing Product resources.

servers:
  - url: http://localhost:8080/api
    description: Local development server

paths:
  /products:
    get:
      summary: Get all products
      description: Retrieve a list of all products in the system.
      responses:
        '200':
          description: A list of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create a new product
      description: Add a new product to the inventory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: The unique identifier of the product.
        schema:
          type: integer
    get:
      summary: Get a product by ID
      description: Retrieve detailed information about a specific product.
      responses:
        '200':
          description: Product details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found.
    put:
      summary: Update a product
      description: Update the attributes of an existing product.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
        '404':
          description: Product not found.
    delete:
      summary: Delete a product
      description: Remove a product from the inventory by its ID.
      responses:
        '204':
          description: Product successfully deleted.
        '404':
          description: Product not found.

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - price
      properties:
        id:
          type: integer
          description: The unique identifier of the product.
          example: 101
        name:
          type: string
          description: The name of the product.
          example: "Wireless Ergonomic Mouse"
        price:
          type: number
          format: float
          description: The price of the product in USD.
          example: 29.99
        category:
          type: string
          description: The category the product belongs to.
          example: "Electronics"
        stock:
          type: integer
          description: The quantity of the product currently in stock.
          example: 150
        description:
          type: string
          description: A detailed description of the product.
          example: "A comfortable, vertical wireless mouse to reduce wrist strain."

    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          description: The name of the product.
          example: "Wireless Ergonomic Mouse"
        price:
          type: number
          format: float
          description: The price of the product in USD.
          example: 29.99
        category:
          type: string
          description: The category the product belongs to.
          example: "Electronics"
        stock:
          type: integer
          description: The quantity of the product currently in stock.
          example: 150
        description:
          type: string
          description: A detailed description of the product.
          example: "A comfortable, vertical wireless mouse to reduce wrist strain."
